<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Malware Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="AegisML ThreatShield">
                <h2>AegisML ThreatShield</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('login') }}" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-section">
        <div class="container">
            <div class="login-card">
                <h2>Login to System</h2>
                <p class="login-subtitle">Access the malware detection dashboard</p>

                {% if error %}
                <div class="alert alert-error">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="Enter username"
                            class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter password"
                            class="form-input">
                    </div>

                    <button type="submit" class="btn-primary btn-block">Login</button>

                    <div class="login-hint">
                        <p>Default credentials: <strong>admin / admin</strong></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; Malware Detection System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Show success message if redirected from successful action
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success')) {
            alert('Login successful!');
        }
    </script>
</body>

</html>
