<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charts - Malware Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="AegisML ThreatShield">
                <h2>AegisML ThreatShield</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('predict_page') }}">Predict</a></li>
                <li><a href="{{ url_for('performance') }}">Performance</a></li>
                <li><a href="{{ url_for('charts') }}" class="active">Charts</a></li>
                <li><a href="{{ url_for('logout') }}">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="charts-section">
        <div class="container">
            <h2>Performance Charts</h2>

            <div class="chart-container">
                <h3>Model Accuracy Comparison</h3>
                <canvas id="accuracyChart"></canvas>
            </div>

            <div class="chart-container">
                <h3>Dataset Distribution</h3>
                <canvas id="datasetChart"></canvas>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; Malware Detection System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Accuracy Chart
        const accuracyCtx = document.getElementById('accuracyChart').getContext('2d');
        const accuracyChart = new Chart(accuracyCtx, {
            type: 'bar',
            data: {
                labels: ['Logistic Regression', 'Extra Trees Classifier'],
                datasets: [{
                    label: 'Test Accuracy (%)',
                    data: [93.67, 97.23],
                    backgroundColor: [
                        'rgba(99, 102, 241, 0.8)',
                        'rgba(16, 185, 129, 0.8)'
                    ],
                    borderColor: [
                        'rgba(99, 102, 241, 1)',
                        'rgba(16, 185, 129, 1)'
                    ],
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            font: {
                                size: 14,
                                family: 'Inter'
                            }
                        }
                    },
                    title: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            callback: function (value) {
                                return value + '%';
                            },
                            font: {
                                size: 12,
                                family: 'Inter'
                            }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    },
                    x: {
                        ticks: {
                            font: {
                                size: 12,
                                family: 'Inter'
                            }
                        },
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });

        // Dataset Distribution Chart
        const datasetCtx = document.getElementById('datasetChart').getContext('2d');
        const datasetChart = new Chart(datasetCtx, {
            type: 'doughnut',
            data: {
                labels: ['Malware (70%)', 'Benign/Goodware (30%)'],
                datasets: [{
                    data: [70, 30],
                    backgroundColor: [
                        'rgba(239, 68, 68, 0.8)',
                        'rgba(34, 197, 94, 0.8)'
                    ],
                    borderColor: [
                        'rgba(239, 68, 68, 1)',
                        'rgba(34, 197, 94, 1)'
                    ],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: {
                                size: 14,
                                family: 'Inter'
                            },
                            padding: 20
                        }
                    },
                    title: {
                        display: false
                    }
                }
            }
        });
    </script>
</body>

</html>
